name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt --check
        run: cargo fmt --check
      - name: cargo clippy -- -D warnings
        run: cargo clippy -- -D warnings
      - name: cargo build
        run: cargo build
      - name: cargo test
        run: cargo test